<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Note to OpenClaw</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="icon" width="48" height="48">
        <div>
          <h1>OpenClaw Notes</h1>
          <p class="subtitle">浏览器笔记助手</p>
        </div>
      </div>
      <div class="status-dot" id="statusDot" title="连接状态"></div>
    </div>

    <!-- 使用说明 (简短版) -->
    <div class="info-card">
      💡 选中网页内容，右键发送到 OpenClaw 即可。
    </div>

    <!-- Tab 导航 -->
    <div class="tabs">
      <button class="tab-link active" data-tab="settings">⚙️ 设置</button>
      <button class="tab-link" data-tab="prompts">🎭 提示词</button>
      <button class="tab-link" data-tab="logs">📜 日志</button>
      <button class="tab-link" data-tab="files">📂 文件</button>
    </div>

    <!-- Tab 内容区域 (固定高度并带滑动条) -->
    <div class="scroll-container">
      <!-- 设置面板 -->
      <div id="settings" class="tab-content active">
        <div class="section-title">Gateway 配置</div>
        <div class="section">
          <label class="label" for="gatewayUrl">Gateway 地址</label>
          <input type="text" id="gatewayUrl" class="input" placeholder="http://127.0.0.1:18789">
        </div>

        <div class="section">
          <label class="label" for="gatewayToken">Gateway Token</label>
          <div class="input-group">
            <input type="password" id="gatewayToken" class="input" placeholder="123456">
            <button class="toggle-password" id="toggleToken">👁</button>
          </div>
        </div>

        <div class="section">
          <label class="label" for="model">模型名称</label>
          <input type="text" id="model" class="input" placeholder="default">
        </div>

        <div class="section">
          <label class="label" for="saveDir">保存目录</label>
          <input type="text" id="saveDir" class="input" placeholder="workspace/web-notes">
          <p class="field-hint">OpenClaw 专用。直连模式将使用下载器。</p>
        </div>

        <div class="section-title">工作模式 (Mode)</div>
        <div class="section">
          <select id="preferredMode" class="input">
            <option value="auto">自动 (优先 OpenClaw)</option>
            <option value="openclaw">仅 OpenClaw</option>
            <option value="direct">仅直连 (Direct AI)</option>
          </select>
        </div>

        <div class="section-title">Direct AI 配置 (可选回退)</div>
        <div class="section">
          <label class="label" for="directBaseUrl">API Base URL</label>
          <input type="text" id="directBaseUrl" class="input" placeholder="https://api.deepseek.com/v1">
        </div>

        <div class="section">
          <label class="label" for="directToken">API Token</label>
          <div class="input-group">
            <input type="password" id="directToken" class="input" placeholder="sk-...">
            <button class="toggle-password" id="toggleDirectToken">👁</button>
          </div>
        </div>

        <div class="section">
          <label class="label" for="directModel">模型名称</label>
          <input type="text" id="directModel" class="input" placeholder="deepseek-chat">
        </div>

        <div class="section">
          <label class="label" for="directSaveSubDir">直连保存子目录</label>
          <input type="text" id="directSaveSubDir" class="input" placeholder="web-notes">
          <p class="field-hint">相对于下载目录，如 <code>ai-notes</code></p>
        </div>

        <div class="section">
          <label class="checkbox-label">
            <input type="checkbox" id="directSaveAs"> 弹出“另存为”窗口
          </label>
        </div>
      </div>

      <!-- 提示词面板 -->
      <div id="prompts" class="tab-content">
        <div class="section-title">系统提示词 (System)</div>
        <div class="section">
          <textarea id="systemPromptTemplate" class="input textarea prompt-box" rows="5"></textarea>
          <p class="field-hint">变量: {pageUrl}, {saveDir}, {filename}</p>
        </div>

        <div class="section-title">总结模板 (User)</div>
        <div class="section">
          <textarea id="promptTemplate" class="input textarea prompt-box" rows="5"></textarea>
          <p class="field-hint">变量: {content}, {pageTitle}, {pageUrl}</p>
        </div>
      </div>

      <!-- 日志面板 -->
      <div id="logs" class="tab-content">
        <div class="list-display" id="logContainer"></div>
      </div>

      <!-- 文件面板 -->
      <div id="files" class="tab-content">
        <div class="list-display" id="fileContainer"></div>
      </div>
    </div>

    <!-- 按钮区 -->
    <div class="button-container">
      <div class="button-row" id="settingsActions">
        <button class="btn btn-secondary" id="testBtn">测试连接</button>
        <button class="btn btn-secondary" id="testDirectBtn">测试直连</button>
        <button class="btn btn-primary" id="saveBtn">保存全部</button>
      </div>
      <div class="button-row" id="logsActions" style="display: none;">
        <button class="btn btn-secondary full-width" id="clearLogs">清空日志</button>
      </div>
      <div class="button-row" id="filesActions" style="display: none;">
        <button class="btn btn-secondary full-width" id="clearFiles">清空记录</button>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="footer">
      <span id="statusText">离线</span>
      <div class="footer-links">
        <span>v1.4.1</span>
        <span>·</span>
        <a href="#" id="resetBtn">恢复默认</a>
      </div>
    </div>

    <div id="toast" class="toast-popup"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
